name: setup-pnpm
description: Set up Node.js and pnpm for ltf-react workflows

inputs:
  node-version:
    description: Node.js version to install
    required: true
  pnpm-version:
    description: pnpm version to activate through Corepack
    required: true

runs:
  using: composite
  steps:
    - name: Use Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: https://npm.pkg.github.com
        scope: "@lv-levtech"

    - name: Enable pnpm through Corepack
      shell: bash
      run: |
        corepack enable
        corepack prepare pnpm@${{ inputs.pnpm-version }} --activate

    - name: Resolve pnpm store directory
      id: pnpm-store-dir
      shell: bash
      run: echo "dir=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

    - name: Restore pnpm store cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ steps.pnpm-store-dir.outputs.dir }}
        key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-pnpm-
