name: Deploy Production

on:
  push:
    tags:
      - levtech-*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write
  actions: read

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: ltf-react-v1-app
  ECS_CLUSTER: ltf-cluster-prd
  ECS_SERVICE: ltf-react-v1-prd-service
  ECS_TASK_DEFINITION: ltf-react-v1-prd
  ECS_CONTAINER_NAME: app

jobs:
  deploy-to-production:
    runs-on: Linux_ARM64_Runner
    timeout-minutes: 30
    environment: production

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.PRD_AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR Private
        id: login-ecr-private
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6
        with:
          registry-type: public

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push image to Amazon ECR
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/node/Dockerfile
          platforms: linux/arm64
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ steps.login-ecr-private.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr-private.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          build-args: |
            CUSTOM_ENV=production
          secrets: |
            node_auth_token=${{ secrets.AUTH_TOKEN_FOR_GITHUBPKG }}
          cache-from: type=registry,ref=${{ steps.login-ecr-private.outputs.registry }}/${{ env.ECR_REPOSITORY }}:buildcache
          cache-to: type=registry,ref=${{ steps.login-ecr-private.outputs.registry }}/${{ env.ECR_REPOSITORY }}:buildcache,mode=max

      - name: Set image output
        id: image
        run: echo "image=${{ steps.login-ecr-private.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ env.ECS_TASK_DEFINITION }}" \
            --query taskDefinition > ecs-task-definition.json

      - name: Clean task definition
        run: |
          jq 'del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy
          )' ecs-task-definition.json > task-definition-base.json

      - name: Render Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@138c24f321fdbdf7edee4a685519d253cae2cdea # v1.9.0
        with:
          task-definition: task-definition-base.json
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ steps.image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@c465972ecbd160473f22e683363b422a5412a3de # v2.6.3
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Manage deployment tag for production
        run: .github/scripts/manage-deployment-tags/run.sh on-production
        continue-on-error: true
