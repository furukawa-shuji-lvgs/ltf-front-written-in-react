name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches:
      - main
      - develop
  delete:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "24.18.0"
  PNPM_VERSION: "10.23.0"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  verify:
    if: github.event_name != 'delete'
    runs-on: ubuntu-slim
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: ./.github/workflows/composite/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.AUTH_TOKEN_FOR_GITHUBPKG }}

      - name: Run verify
        run: pnpm verify
        env:
          CI: "true"

  dependency-audit:
    if: github.event_name != 'delete'
    runs-on: ubuntu-slim
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: ./.github/workflows/composite/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Audit production dependencies
        run: pnpm deps:audit
        env:
          NODE_AUTH_TOKEN: ${{ secrets.AUTH_TOKEN_FOR_GITHUBPKG }}

  coverage:
    if: github.event_name != 'delete'
    runs-on: ubuntu-slim
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: ./.github/workflows/composite/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.AUTH_TOKEN_FOR_GITHUBPKG }}

      - name: Run unit tests with coverage
        run: pnpm test:coverage:thresholds
        env:
          CI: "true"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

  docker-build:
    if: github.event_name != 'delete'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/node/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: ltf-react:ci
          build-args: |
            CUSTOM_ENV=development
          secrets: |
            node_auth_token=${{ secrets.AUTH_TOKEN_FOR_GITHUBPKG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke Docker image
        run: |
          container_id="$(docker run -d -p 3000:3000 ltf-react:ci)"
          trap 'docker rm -f "$container_id" >/dev/null' EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:3000/api/health"; then
              exit 0
            fi
            sleep 2
          done
          docker logs "$container_id"
          exit 1

  e2e:
    if: github.event_name != 'delete'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup pnpm
        uses: ./.github/workflows/composite/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.AUTH_TOKEN_FOR_GITHUBPKG }}

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm e2e
        env:
          CI: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

  visual-regression:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-vrt'))
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lv-levtech/ltf-front
          path: ltf-front-baseline

      - name: Setup pnpm
        uses: ./.github/workflows/composite/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.AUTH_TOKEN_FOR_GITHUBPKG }}

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Check ltf-front baseline snapshots
        run: pnpm e2e:visual:baseline:check
        env:
          LTF_FRONT_ROOT: ${{ github.workspace }}/ltf-front-baseline

      - name: Run visual regression tests
        run: pnpm e2e:visual
        env:
          CI: "true"
          LTF_FRONT_ROOT: ${{ github.workspace }}/ltf-front-baseline

      - name: Upload visual report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-visual-report
          path: playwright-report/visual
          if-no-files-found: ignore

      - name: Upload visual diffs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-visual-test-results
          path: test-results
          if-no-files-found: ignore

      - name: Summarize visual regression artifacts
        if: always()
        run: |
          {
            echo "## Visual regression artifacts"
            echo "- playwright-visual-report"
            echo "- playwright-visual-test-results"
          } >> "$GITHUB_STEP_SUMMARY"

  proto-ci:
    if: github.event_name != 'delete'
    runs-on: ubuntu-slim
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run Buf action
        uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
        with:
          input: contracts/grpc
          version: "1.71.0"
          token: ${{ secrets.BUF_TOKEN }}
