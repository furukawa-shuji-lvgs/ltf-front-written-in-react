syntax = "proto3";

package ltf.project.detail;

import "google/protobuf/wrappers.proto";
import "project/detail/project_base_data.proto";
import "project/detail/project_coordinator_info.proto";
import "project/detail/project_other_requirement.proto";
import "project/detail/project_request_skill.proto";
import "project/detail/project_settlement_and_payment.proto";
import "project/detail/project_tool_and_skill.proto";
import "shared/project.proto";

/* 案件詳細 */
message ProjectDetailData {
  // 案件基本情報
  ltf.project.detail.ProjectBaseData base_data = 1;
  // 職務内容
  string work_content = 2;
  // 求めるスキル
  ltf.project.detail.ProjectRequestSkill request_skill = 3;
  // 言語・ツール
  ltf.project.detail.ProjectToolAndSkill skills = 4;
  // 精算・お支払い
  ltf.project.detail.ProjectSettlementAndPayment settlement_and_payment = 5;
  // その他募集要項
  ltf.project.detail.ProjectOtherRequirement other_requirement = 6;
  // おすすめポイント
  repeated ltf.shared.project.ProjectSearchLink fits = 7;
  // 担当者情報
  ltf.project.detail.ProjectCoordinatorInfo coordinator_info = 8;
  // リモートワーク形態ID
  google.protobuf.Int32Value remote_work_type_id = 9;
}
