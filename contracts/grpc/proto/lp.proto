syntax = "proto3";

package ltf.lp;

import "common/response.proto";
import "google/protobuf/wrappers.proto";
import "results/result.proto";

/**
 * LP情報取得サービス
 */
service Lp {
  /**
   * リダイレクト先のデータ取得
   */
  rpc GetLpInfo(GetLpInfoRequest) returns (GetLpInfoResponse);
}

/**
 * リダイレクト先のデータ取得用のリクエスト
 */
message GetLpInfoRequest {
  string lp_number = 1;
  string user_agent = 2;
}

/**
 * リダイレクト先のデータ取得用のレスポンス
 */
message GetLpInfoResponse {
  google.protobuf.StringValue inflow_param = 1; // 流入パラメータ
  google.protobuf.StringValue substitute_lp_no = 2; // 代替LP番号 ※非対応デバイスのときに飛ばす
  google.protobuf.StringValue redirect_lp_no = 3; // リダイレクト先LP番号
  repeated MsContractTypeData contract_types = 4; // ご希望の働き方(LPの上部にあるEFリンクボタンのデータ)
  results.Result result = 101;
  repeated common.response.Error errors = 102;
}

/**
 * ご希望の働き方
 */
message MsContractTypeData {
  int32 contract_no = 1; // MsContractTypeのID
  string contract_name = 2; // MsContractTypeのname(例：フリーランス、派遣、正社員)
}
