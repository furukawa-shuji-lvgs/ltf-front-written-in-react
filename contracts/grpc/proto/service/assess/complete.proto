syntax = "proto3";

package ltf.service.assess.complete;

import "common/response.proto";
import "google/protobuf/wrappers.proto";
import "results/result.proto";
import "shared/project_search.proto";

/**
 * 単価診断結果サービス
 */
service ServiceAssessComplete {
  /**
   * 単価診断結果取得
   */
  rpc GetAssessResults(GetAssessResultsRequest) returns (GetAssessResultsResponse);

  /**
   * 案件一覧取得
   */
  rpc GetProjects(GetProjectsRequest) returns (GetProjectsResponse);
}

/**
 * 単価診断結果取得用のリクエスト
 */
message GetAssessResultsRequest {
  SkillOption skill = 1; // Q2 主要スキル回答
  int32 experience_year_id = 2; // Q3 経験年数回答
  int32 current_monthly_income_id = 3; // Q4 現在のおおよその月収回答
  int32 freelance_aspiration_id = 4; // Q5 フリーランス活動に求めるもの回答
}

message SkillOption {
  int32 category_id = 1;
  int32 skill_id = 2;
}

/**
 * 単価診断結果取得用のレスポンス
 */
message GetAssessResultsResponse {
  int32 price = 1; // 想定単価（万円）
  string skill_name = 2; // スキル
  string experience_year = 3; // 経験年数
  string current_monthly_income = 4; // 現在の月収
  CtaMessage cta_message = 5; // メッセージ
  ltf.results.Result result = 100;
  repeated common.response.Error errors = 101;
}

message CtaMessage {
  string sub = 1;
  string main = 2;
  google.protobuf.StringValue annotation = 3;
}

/**
 * 単価診断選択項目の取得用のリクエスト
 */
message GetProjectsRequest {
  int32 skill_category_id = 1; // スキルを識別するカテゴリID
  int32 skill_id = 2; // スキルID
  int32 price = 3; // 単価
}

/**
 * 単価診断選択項目の取得用のレスポンス
 */
message GetProjectsResponse {
  repeated ltf.shared.project_search.SearchProjectData projects = 1; // 案件一覧
  ltf.results.Result result = 100;
  repeated common.response.Error errors = 101;
}
