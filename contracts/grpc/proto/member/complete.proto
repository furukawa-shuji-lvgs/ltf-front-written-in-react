syntax = "proto3";

package ltf.member.complete;

import "common/response.proto";
import "google/protobuf/wrappers.proto";
import "results/result.proto";
import "shared/entry.proto";

/**
 * メンバーEFサービス
 */
service MemberComplete {
  /**
   * エントリー情報登録
   */
  rpc PostEntryInfo(PostEntryInfoRequest) returns (PostEntryInfoResponse);
  /**
   * エントリー情報取得
   */
  rpc GetEntryInfo(GetEntryInfoRequest) returns (GetEntryInfoResponse);
}

/**
 * エントリー情報登録のリクエスト
 */
message PostEntryInfoRequest {
  shared.entry.EntryData entry = 1; // エントリー情報
  repeated shared.entry.EntryAccessHistory entry_access_histories = 2; // エントリーアクセス履歴
  shared.entry.FacebookCookie facebook_cookie = 3; // Facebook広告コンバージョンAPI連携用Cookie
  shared.entry.SessionInfo session = 4; // セッション情報
  google.protobuf.BoolValue is_partnership_media_entry = 5; // 提携媒体応募メールに記載のURLからの流入かどうか
}

/**
 * エントリー情報取得のリクエスト
 */
message GetEntryInfoRequest {
  int32 entry_id = 1; // エントリーID
}

/**
 * エントリー情報登録のレスポンス
 */
message PostEntryInfoResponse {
  int32 entry_id = 1; // エントリーID
  results.Result result = 100;
  repeated common.response.Error errors = 101;
}

/**
 * エントリー情報取得のレスポンス
 */
message GetEntryInfoResponse {
  /**
   * dataLayer 変数用
   */
  string sip = 1; // エントリーIDに紐づくsip
  /**
   * ①契約形態IDが3（正社員）の場合、GoogleForm へのリダイレクトURL（domain/${page_id}/${entryId}/2/）
   * ②契約形態IDが3（正社員）以外の場合、LTのスキル入力用URL（domain/f/${code}/prefix or name or click_id/）
   */
  google.protobuf.StringValue jf_url_engineer = 2; // エンジニア用のJF URL
  google.protobuf.StringValue jf_url_creator = 3; // クリエイター用のJF URL
  google.protobuf.StringValue jf_url_google_form = 4; // Google Form用のJF URL
  google.protobuf.StringValue phone = 5; // dataLayer 変数用携帯番号（LP経由のエントリーの場合のみ返却）
  google.protobuf.StringValue mailaddress = 6; // dataLayer 変数用メールアドレス（LP経由のエントリーの場合のみ返却）
  results.Result result = 100;
  repeated common.response.Error errors = 101;
}
